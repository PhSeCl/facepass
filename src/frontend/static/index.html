<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FacePass</title>
  <style>
    :root {
      --bg: #eef2ff;
      /* Frosted glass surfaces: translucent white over the gradient backdrop. */
      --surface: rgba(255, 255, 255, .55);
      --surface2: rgba(255, 255, 255, .4);
      --surface-strong: rgba(255, 255, 255, .72);
      --border: rgba(255, 255, 255, .65);
      --border-soft: rgba(var(--accent-rgb),.18);
      --text: #1e2433;
      --text2: #6b7280;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent-rgb: 99, 102, 241;
      --accent-grad: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --green: #16a34a;
      --red: #ef4444;
      --shadow: 0 8px 32px rgba(31, 38, 135, .12);
      --shadow-lg: 0 12px 40px rgba(31, 38, 135, .18);
      --hover-bg: rgba(255, 255, 255, .4);
      --hover-strong: #ffffff;
      --skeleton-1: rgba(255, 255, 255, .35);
      --skeleton-2: rgba(255, 255, 255, .65);
      --radius: 18px;
      --radius-sm: 12px;
      --bg-grad:
        radial-gradient(circle at 12% 18%, rgba(129, 140, 248, .35), transparent 42%),
        radial-gradient(circle at 88% 12%, rgba(236, 72, 153, .22), transparent 45%),
        radial-gradient(circle at 78% 88%, rgba(34, 211, 238, .28), transparent 45%),
        linear-gradient(135deg, #eef2ff 0%, #faf5ff 38%, #fdf2f8 68%, #ecfeff 100%);
    }

    html[data-theme="dark"] {
      --bg: #0a0a0c;
      --surface: rgba(255, 255, 255, .055);
      --surface2: rgba(255, 255, 255, .035);
      --surface-strong: rgba(255, 255, 255, .08);
      --border: rgba(255, 255, 255, .1);
      --border-soft: rgba(255, 255, 255, .18);
      --text: #ededf0;
      --text2: #9a9aa3;
      /* Dark mode accent: soft pink-white instead of indigo/violet. */
      --accent: #f0d6e2;
      --accent2: #f7e6ef;
      --accent-rgb: 240, 214, 226;
      --accent-grad: linear-gradient(135deg, #f9e7f0 0%, #e8cdda 100%);
      --shadow: 0 8px 32px rgba(0, 0, 0, .55);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, .7);
      --hover-bg: rgba(255, 255, 255, .06);
      --hover-strong: rgba(255, 255, 255, .14);
      --skeleton-1: rgba(255, 255, 255, .04);
      --skeleton-2: rgba(255, 255, 255, .1);
      /* Deep neutral charcoal, barely-there cool sheen — no indigo/violet cast. */
      --bg-grad:
        radial-gradient(circle at 15% 12%, rgba(255, 255, 255, .035), transparent 40%),
        radial-gradient(circle at 85% 88%, rgba(255, 255, 255, .025), transparent 42%),
        linear-gradient(135deg, #0b0b0d 0%, #111113 48%, #0a0a0c 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background: var(--bg-grad);
      background-attachment: fixed;
      transition: color .3s ease;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      animation: fadeUp .5s ease;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text2);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: all .4s ease;
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 8px rgba(34, 197, 94, .5);
    }

    /* Tabs — each tab is its own distinct rounded "block" capsule */
    .tabs {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px;
      margin-bottom: 40px;
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: var(--shadow);
      animation: fadeUp .5s ease .1s both;
    }

    .tab {
      flex: 1;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all .25s ease;
      color: var(--text2);
      background: var(--surface2);
      border: 1px solid var(--border);
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .tab:hover {
      color: var(--text);
      background: var(--hover-bg);
      transform: translateY(-1px);
    }

    .tab.active {
      background: var(--surface-strong);
      border-color: rgba(var(--accent-rgb),.5);
      color: var(--accent);
      box-shadow: 0 4px 14px rgba(var(--accent-rgb),.22);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 2px;
      border-radius: 1px;
      background: var(--accent);
      animation: tabIndicator .3s ease;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
      box-shadow: var(--shadow);
      animation: fadeUp .4s ease .15s both;
      transition: box-shadow .3s ease, transform .3s ease, border-color .3s ease;
    }

    .card:hover {
      border-color: var(--border-soft);
      box-shadow: var(--shadow-lg);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed rgba(var(--accent-rgb),.35);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .3s ease;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover {
      border-color: var(--accent);
      background: var(--hover-bg);
    }

    .upload-zone.drag {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb),.08);
    }

    .upload-zone.has-image {
      padding: 0;
      border: none;
      cursor: default;
    }

    .upload-zone.has-image:hover {
      background: transparent;
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      color: var(--text2);
      opacity: .6;
      transition: transform .3s ease;
    }

    .upload-zone:hover .upload-icon {
      transform: translateY(-4px);
    }

    .upload-text {
      font-size: 14px;
      color: var(--text2);
    }

    .upload-hint {
      font-size: 12px;
      color: var(--text2);
      opacity: .6;
      margin-top: 8px;
    }

    .preview-img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      border-radius: var(--radius);
      display: block;
      animation: fadeIn .4s ease;
    }

    .preview-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
    }

    .preview-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .6);
      border: none;
      cursor: pointer;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: all .2s ease;
    }

    .preview-btn:hover {
      background: rgba(0, 0, 0, .8);
      transform: scale(1.1);
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all .25s ease;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb),.15);
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s ease;
      font-family: inherit;
      border: none;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background .3s ease;
    }

    .btn:active::after {
      background: rgba(255, 255, 255, .18);
    }

    .btn-primary {
      background: var(--accent-grad);
      color: #fff;
      box-shadow: 0 6px 18px rgba(var(--accent-rgb),.35);
    }

    /* Pale pink-white fill in dark mode needs dark text to stay readable. */
    html[data-theme="dark"] .btn-primary {
      color: #2a2026;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(var(--accent-rgb),.45);
    }

    .btn-primary:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--surface-strong);
      color: var(--text);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 2px 10px rgba(31, 38, 135, .08);
    }

    .btn-secondary:hover {
      background: var(--hover-strong);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(31, 38, 135, .14);
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    /* Results */
    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      animation: fadeUp .35s ease both;
      transition: all .25s ease;
    }

    .result-card:hover {
      border-color: var(--border-soft);
      box-shadow: 0 6px 18px rgba(31, 38, 135, .1);
      transform: translateX(4px);
    }

    .result-card:nth-child(1) {
      animation-delay: .05s;
    }

    .result-card:nth-child(2) {
      animation-delay: .1s;
    }

    .result-card:nth-child(3) {
      animation-delay: .15s;
    }

    .result-card:nth-child(4) {
      animation-delay: .2s;
    }

    .result-card:nth-child(5) {
      animation-delay: .25s;
    }

    .result-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-size: 16px;
      font-weight: 600;
    }

    .result-id {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    .result-meta {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--text2);
    }

    .result-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-match {
      background: rgba(34, 197, 94, .15);
      color: var(--green);
    }

    .badge-unknown {
      background: rgba(239, 68, 68, .15);
      color: var(--red);
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      backdrop-filter: blur(12px);
      animation: toastIn .35s ease, toastOut .3s ease 2.7s forwards;
    }

    .toast.success {
      background: rgba(34, 197, 94, .2);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, .3);
    }

    .toast.error {
      background: rgba(239, 68, 68, .2);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, .3);
    }

    /* Image w/ boxes - use percentage positioning so boxes stay accurate at any size */
    .result-image-wrap {
      position: relative;
      display: block;
      width: 100%;
      max-width: 640px;
      margin: 0 auto 24px;
      border-radius: var(--radius);
      overflow: hidden;
      line-height: 0;
      animation: fadeIn .5s ease;
    }

    .result-image-wrap img {
      width: 100%;
      display: block;
      border-radius: var(--radius);
    }

    .face-box {
      position: absolute;
      border: 2px solid;
      border-radius: 4px;
      pointer-events: none;
      animation: boxPulse 2s ease-in-out infinite;
    }

    .face-label {
      position: absolute;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      color: #fff;
      transform: translateY(-100%);
      animation: labelFade .4s ease both;
    }

    /* Identity List */
    .identity-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .identity-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      transition: all .25s ease;
      animation: fadeUp .3s ease both;
    }

    .identity-row:hover {
      background: rgba(var(--accent-rgb),.1);
      transform: translateX(4px);
    }

    .identity-row-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .identity-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
    }

    .identity-name {
      font-size: 14px;
      font-weight: 500;
    }

    .identity-meta {
      font-size: 12px;
      color: var(--text2);
    }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
      animation: fadeIn .5s ease;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: .4;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-1) 25%, var(--skeleton-2) 50%, var(--skeleton-1) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
      height: 60px;
      margin-bottom: 12px;
    }

    /* Keyframes */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-8px);
      }
    }

    @keyframes tabIndicator {
      from {
        width: 0;
      }

      to {
        width: 24px;
      }
    }

    @keyframes boxPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .7;
      }
    }

    @keyframes labelFade {
      from {
        opacity: 0;
        transform: translateY(-80%);
      }

      to {
        opacity: 1;
        transform: translateY(-100%);
      }
    }

    @keyframes shimmer {
      from {
        background-position: -200% 0;
      }

      to {
        background-position: 200% 0;
      }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .app {
        padding: 24px 16px 60px;
      }

      .card {
        padding: 24px 20px;
      }

      .header {
        margin-bottom: 32px;
      }

      .face-label {
        font-size: 10px;
        padding: 1px 6px;
      }
    }

    /* Eval Metrics */
    .eval-summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .eval-metric {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 14px rgba(31, 38, 135, .08);
    }

    .eval-metric-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .eval-metric-label {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }

    .eval-metric.green .eval-metric-value {
      color: var(--green);
    }

    .eval-metric.red .eval-metric-value {
      color: var(--red);
    }

    .plot-img {
      width: 100%;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }

    /* Theme toggle */
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-2px) rotate(-12deg);
      box-shadow: var(--shadow-lg);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    .theme-toggle .icon-moon {
      display: none;
    }

    html[data-theme="dark"] .theme-toggle .icon-sun {
      display: none;
    }

    html[data-theme="dark"] .theme-toggle .icon-moon {
      display: block;
    }

    /* Gallery photo in recognize results */
    .gallery-photo {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">FacePass</div>
      <div class="header-right">
        <div class="status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">检测中...</span>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换亮/暗主题" aria-label="切换亮暗主题">
          <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4" />
            <path stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
          <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('recognize')">识别</button>
      <button class="tab" onclick="switchTab('register')">录入</button>
      <button class="tab" onclick="switchTab('gallery')">底库</button>
      <button class="tab" onclick="switchTab('eval')">评估</button>
    </div>

    <!-- ========== Recognize Tab ========== -->
    <div id="tab-recognize">
      <div class="card">
        <div class="card-title">人脸识别</div>
        <div class="upload-zone" id="recognizeDropZone" onclick="document.getElementById('recognizeInput').click()">
          <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
          <div class="upload-text">点击或拖拽上传图片</div>
          <div class="upload-hint">JPG / PNG / WEBP</div>
        </div>
        <input type="file" id="recognizeInput" accept="image/*" style="display:none"
          onchange="handleRecognizeFile(this.files[0])">
      </div>
      <div id="recognizeResult" style="display:none">
        <div class="card">
          <div class="card-title">检测结果</div>
          <div id="recognizeImageWrap" style="text-align:center"></div>
          <div id="recognizeList"></div>
        </div>
      </div>
    </div>

    <!-- ========== Register Tab ========== -->
    <div id="tab-register" style="display:none">
      <div class="card">
        <div class="card-title">录入人脸</div>
        <div class="upload-zone" id="registerDropZone" onclick="document.getElementById('registerInput').click()">
          <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          <div class="upload-text">点击或拖拽上传人脸照片</div>
          <div class="upload-hint">支持批量上传多张照片 · JPG / PNG</div>
        </div>
        <input type="file" id="registerInput" accept="image/*" multiple style="display:none"
          onchange="handleRegisterFiles(this.files)">
      </div>
      <div class="card" id="registerFormCard" style="display:none">
        <div class="card-title">身份信息 <span id="regFileCount"
            style="font-weight:400;color:var(--text2);font-size:13px"></span></div>
        <div class="form-group">
          <label class="form-label">身份 ID</label>
          <input class="form-input" id="regIdentityId" placeholder="例如：p21（必填）">
        </div>
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input class="form-input" id="regName" placeholder="例如：张三">
        </div>
        <button class="btn btn-primary" id="regSubmitBtn" onclick="submitRegister()">录入底库</button>
      </div>
      <div id="registerResult" style="display:none"></div>
    </div>

    <!-- ========== Gallery Tab ========== -->
    <div id="tab-gallery" style="display:none">
      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
          已录入身份
          <button class="btn btn-secondary" style="padding:8px 16px;font-size:13px"
            onclick="loadIdentities()">刷新</button>
        </div>
        <div class="identity-list" id="identityList">
          <div class="empty">
            <div class="empty-icon">---</div>
            <div>加载中...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== Eval Tab ========== -->
    <div id="tab-eval" style="display:none">
      <div class="card">
        <div class="card-title">批量评估</div>
        <div class="upload-zone" id="evalDropZone" onclick="document.getElementById('evalInput').click()">
          <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
          </svg>
          <div class="upload-text">点击或拖拽上传测试数据集 ZIP</div>
          <div class="upload-hint">ZIP 格式 · 包含 registered/ 和 test/ 目录及标注文件</div>
        </div>
        <input type="file" id="evalInput" accept=".zip" style="display:none" onchange="handleEvalFile(this.files[0])">
        <div style="margin-top:16px">
          <div class="form-label" style="margin-bottom:8px">或：使用本地数据集文件夹（超大数据集免上传）</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <input class="form-input" id="evalDirInput" style="flex:1;min-width:240px"
              placeholder="数据集文件夹绝对路径，例如 F:\facepass\dataset"
              onkeydown="if(event.key==='Enter')useEvalDir()">
            <button class="btn btn-secondary" style="padding:12px 18px;font-size:14px"
              onclick="pickEvalDir()">浏览…</button>
            <button class="btn btn-primary" style="padding:12px 18px;font-size:14px"
              onclick="useEvalDir()">使用此目录</button>
          </div>
          <div class="upload-hint" style="margin-top:8px">需是含 registered/ 与 test/ 的目录，或直接是 test 目录</div>
        </div>
      </div>
      <div class="card" id="evalInfoCard" style="display:none">
        <div class="card-title">数据集信息</div>
        <div id="evalInfoList"></div>
      </div>
      <div class="card" style="display:none" id="evalActionCard">
        <button class="btn btn-primary" id="evalRunBtn" onclick="runEval()">
          开始评估
        </button>
        <span style="margin-left:12px;font-size:13px;color:var(--text2)" id="evalStatus"></span>
      </div>
      <div id="evalResult" style="display:none">
        <div class="card">
          <div class="card-title">评估结果</div>
          <div id="evalSummary" class="eval-summary"></div>
        </div>
        <div class="card" id="evalPlotsCard" style="display:none">
          <div class="card-title">可视化图表</div>
          <div id="evalPlots"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API = 'http://127.0.0.1:8000';
    const THEME_KEY = 'facepass-theme';
    let recognizeFile = null;
    let registerFiles = [];
    let evalFile = null;
    let evalDir = null;

    // Apply the saved theme (or follow the OS preference) immediately, before the
    // page paints, so there is no flash of the wrong theme.
    (function initTheme() {
      let theme = null;
      try { theme = localStorage.getItem(THEME_KEY); } catch (e) { /* storage blocked */ }
      if (theme !== 'dark' && theme !== 'light') {
        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.dataset.theme = theme;
    })();

    function toggleTheme() {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem(THEME_KEY, next); } catch (e) { /* storage blocked */ }
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkHealth();
      setupDragDrop('recognizeDropZone', 'recognizeInput', (files) => handleRecognizeFile(files[0]));
      setupDragDrop('registerDropZone', 'registerInput', (files) => handleRegisterFiles(files));
      setupDragDrop('evalDropZone', 'evalInput', (files) => handleEvalFile(files[0]));
    });

    function setupDragDrop(zoneId, inputId, handler) {
      const zone = document.getElementById(zoneId);
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('drag');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        if (files.length > 0) handler(files);
      });
    }

    async function checkHealth() {
      try {
        const r = await fetch(API + '/health');
        setStatus(r.ok);
      } catch { setStatus(false); }
    }

    function setStatus(online) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (online) { dot.classList.add('online'); text.textContent = '已连接'; }
      else { dot.classList.remove('online'); text.textContent = '未连接'; }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['recognize', 'register', 'gallery', 'eval'][i] === tab);
      });
      const panels = {
        recognize: document.getElementById('tab-recognize'),
        register: document.getElementById('tab-register'),
        gallery: document.getElementById('tab-gallery'),
        eval: document.getElementById('tab-eval')
      };
      Object.entries(panels).forEach(([key, el]) => {
        el.style.display = key === tab ? '' : 'none';
      });
      if (tab === 'gallery') loadIdentities();
    }

    function toast(msg, type) {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    // --- Recognize ---
    function handleRecognizeFile(file) {
      if (!file) return;
      recognizeFile = file;
      const zone = document.getElementById('recognizeDropZone');
      zone.classList.add('has-image');
      zone.innerHTML = `<img class="preview-img" src="${URL.createObjectURL(file)}" alt="preview"><div class="preview-actions"><button class="preview-btn" onclick="event.stopPropagation();clearRecognize()"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
      zone.onclick = null;
      runRecognize();
    }

    function clearRecognize() {
      recognizeFile = null;
      const zone = document.getElementById('recognizeDropZone');
      zone.classList.remove('has-image');
      zone.innerHTML = `<svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg><div class="upload-text">点击或拖拽上传图片</div><div class="upload-hint">JPG / PNG / WEBP</div>`;
      zone.onclick = () => document.getElementById('recognizeInput').click();
      document.getElementById('recognizeResult').style.display = 'none';
    }

    async function runRecognize() {
      if (!recognizeFile) return;
      setStatus(true);
      const form = new FormData();
      form.append('file', recognizeFile);

      const resultDiv = document.getElementById('recognizeResult');
      const wrap = document.getElementById('recognizeImageWrap');
      const list = document.getElementById('recognizeList');
      resultDiv.style.display = '';

      // Loading state
      wrap.innerHTML = '<div style="text-align:center;padding:24px"><span class="spinner" style="width:28px;height:28px;border-width:3px;display:inline-block;color:var(--text2)"></span></div>';
      list.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';

      try {
        const r = await fetch(API + '/recognize', { method: 'POST', body: form });
        if (!r.ok) {
          const err = await r.json().catch(() => ({ message: '请求失败' }));
          toast(err.message || '识别失败', 'error');
          wrap.innerHTML = '';
          list.innerHTML = '';
          return;
        }
        const results = await r.json();

        if (!results || results.length === 0) {
          wrap.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text2)">未检测到人脸</div>`;
          list.innerHTML = '';
          return;
        }

        // Draw image with percentage-based boxes — always accurate regardless of display size
        const imgUrl = URL.createObjectURL(recognizeFile);
        const img = new Image();
        img.onload = () => {
          const nW = img.naturalWidth;
          const nH = img.naturalHeight;

          let html = `<div class="result-image-wrap">`;
          html += `<img src="${imgUrl}" alt="result">`;

          results.forEach((res, i) => {
            const [bx, by, bw, bh] = res.bbox;
            const color = res.is_unknown ? 'var(--red)' : 'var(--green)';
            const label = res.is_unknown ? '未知' : (res.name || res.identity_id);
            const left = (bx / nW * 100);
            const top = (by / nH * 100);
            const width = (bw / nW * 100);
            const height = (bh / nH * 100);

            html += `<div class="face-box" style="left:${left}%;top:${top}%;width:${width}%;height:${height}%;border-color:${color};animation-delay:${i * 0.3}s"></div>`;
            html += `<div class="face-label" style="left:${left}%;top:${top}%;background:${color};animation-delay:${i * 0.3}s">${label} ${res.similarity.toFixed(2)}</div>`;
          });

          html += '</div>';
          wrap.innerHTML = html;
        };
        img.src = imgUrl;

        // Results list
        list.innerHTML = results.map((res, i) => {
          const galleryImg = !res.is_unknown && res.identity_id !== 'unknown'
            ? `<img class="gallery-photo" src="${API}/identity/${encodeURIComponent(res.identity_id)}/image" alt="${res.name || res.identity_id}" onerror="this.style.display='none'" loading="lazy">`
            : '';
          return `
      <div class="result-card" style="animation-delay:${i * 0.08}s">
        ${galleryImg}
        <div class="result-avatar" style="background:${res.is_unknown ? 'rgba(239,68,68,.1)' : 'rgba(34,197,94,.1)'};color:${res.is_unknown ? 'var(--red)' : 'var(--green)'}">${res.is_unknown ? '?' : (res.name || res.identity_id).charAt(0)}</div>
        <div class="result-info">
          <div class="result-name">
            ${res.is_unknown ? '未知身份' : (res.name || res.identity_id)}
            <span class="badge ${res.is_unknown ? 'badge-unknown' : 'badge-match'}">${res.is_unknown ? '未知' : '已匹配'}</span>
          </div>
          <div class="result-id">ID: ${res.identity_id}</div>
          <div class="result-meta">
            <span>${(res.similarity * 100).toFixed(1)}%</span>
            <span>[${res.bbox[0]}, ${res.bbox[1]}, ${res.bbox[2]}x${res.bbox[3]}]</span>
          </div>
        </div>
      </div>
    `}).join('');

      } catch (e) {
        toast('网络错误，请检查服务是否运行', 'error');
        setStatus(false);
        wrap.innerHTML = '';
        list.innerHTML = '';
      }
    }

    // --- Register ---
    function handleRegisterFiles(files) {
      if (!files || files.length === 0) return;
      registerFiles = Array.from(files);
      const count = registerFiles.length;

      const zone = document.getElementById('registerDropZone');
      zone.classList.add('has-image');

      if (count === 1) {
        zone.innerHTML = `<img class="preview-img" src="${URL.createObjectURL(registerFiles[0])}" alt="preview"><div class="preview-actions"><button class="preview-btn" onclick="event.stopPropagation();clearRegister()"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
      } else {
        zone.innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap;padding:16px;max-height:300px;overflow-y:auto">${registerFiles.slice(0, 6).map(f => `<img src="${URL.createObjectURL(f)}" style="width:80px;height:80px;object-fit:cover;border-radius:8px">`).join('')}${count > 6 ? `<div style="width:80px;height:80px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2)">+${count - 6}</div>` : ''}</div><div class="preview-actions"><button class="preview-btn" onclick="event.stopPropagation();clearRegister()"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
      }

      zone.onclick = null;
      document.getElementById('registerFormCard').style.display = '';
      document.getElementById('regFileCount').textContent = `(${count} 张照片)`;
      document.getElementById('registerResult').style.display = 'none';
    }

    function clearRegister() {
      registerFiles = [];
      const zone = document.getElementById('registerDropZone');
      zone.classList.remove('has-image');
      zone.innerHTML = `<svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.5v15m7.5-7.5h-12"/></svg><div class="upload-text">点击或拖拽上传人脸照片</div><div class="upload-hint">支持批量上传多张照片 · JPG / PNG</div>`;
      zone.onclick = () => document.getElementById('registerInput').click();
      document.getElementById('registerFormCard').style.display = 'none';
      document.getElementById('registerResult').style.display = 'none';
      document.getElementById('regIdentityId').value = '';
      document.getElementById('regName').value = '';
    }

    async function submitRegister() {
      if (registerFiles.length === 0) { toast('请先上传照片', 'error'); return; }

      const identityId = document.getElementById('regIdentityId').value.trim();
      const name = document.getElementById('regName').value.trim();
      if (!identityId) { toast('请输入身份 ID', 'error'); return; }

      const btn = document.getElementById('regSubmitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 录入中...';

      try {
        const form = new FormData();
        registerFiles.forEach(f => form.append('files', f));
        form.append('identity_id', identityId);
        form.append('name', name);

        const r = await fetch(API + '/register/batch', { method: 'POST', body: form });
        const data = await r.json();
        if (!r.ok) { toast(data.message || '录入失败', 'error'); btn.disabled = false; btn.innerHTML = '录入底库'; return; }

        toast(`录入成功: ${data.saved || 1} 张`, 'success');

        const resultDiv = document.getElementById('registerResult');
        resultDiv.style.display = '';
        resultDiv.innerHTML = `<div class="card"><div class="card-title">录入完成</div><div class="result-card"><div class="result-avatar" style="background:rgba(34,197,94,.1);color:var(--green)">${(data.name || data.identity_id).charAt(0)}</div><div class="result-info"><div class="result-name">${data.name || data.identity_id}</div><div class="result-id">成功: ${data.saved || 1} 张 · ID: ${data.identity_id}</div></div></div><button class="btn btn-secondary" style="margin-top:12px" onclick="clearRegister()">继续录入</button></div>`;

        clearRegister();
      } catch (e) {
        toast('网络错误，请检查服务是否运行', 'error');
        setStatus(false);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '录入底库';
      }
    }

    // --- Identities ---
    async function loadIdentities() {
      const list = document.getElementById('identityList');
      try {
        const r = await fetch(API + '/identities');
        if (!r.ok) throw new Error();
        const data = await r.json();

        if (!data.identities || data.identities.length === 0) {
          list.innerHTML = '<div class="empty"><div class="empty-icon">---</div><div>暂无录入身份</div></div>';
          return;
        }

        list.innerHTML = data.identities.map((item, i) => `
      <div class="identity-row" style="animation-delay:${i * 0.04}s">
        <div class="identity-row-left">
          <div class="identity-avatar">${(item.name || item.identity_id).charAt(0)}</div>
          <div>
            <div class="identity-name">${item.name || item.identity_id}</div>
            <div class="identity-meta">ID: ${item.identity_id}</div>
          </div>
        </div>
        <div class="identity-meta">${item.valid_image_count || item.prototype_count || 0} 张注册图</div>
      </div>
    `).join('');

      } catch {
        list.innerHTML = '<div class="empty"><div class="empty-icon">---</div><div>无法加载底库，请检查服务</div></div>';
      }
    }

    // --- Eval ---
    function handleEvalFile(file) {
      if (!file || !file.name.toLowerCase().endsWith('.zip')) {
        toast('请上传 ZIP 文件', 'error');
        return;
      }
      evalFile = file;
      evalDir = null;
      document.getElementById('evalDirInput').value = '';
      const zone = document.getElementById('evalDropZone');
      zone.classList.add('has-image');
      zone.innerHTML = `<div style="padding:24px;text-align:center"><div style="font-size:14px;color:var(--text)">${file.name}</div><div style="font-size:12px;color:var(--text2);margin-top:4px">${(file.size / 1024 / 1024).toFixed(1)} MB</div><div class="preview-actions"><button class="preview-btn" onclick="event.stopPropagation();clearEval()"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div></div>`;
      zone.onclick = null;

      // Inspect dataset
      inspectEvalDataset();
    }

    function clearEval() {
      evalFile = null;
      evalDir = null;
      document.getElementById('evalDirInput').value = '';
      clearEvalZoneVisual();
      document.getElementById('evalInfoCard').style.display = 'none';
      document.getElementById('evalActionCard').style.display = 'none';
      document.getElementById('evalResult').style.display = 'none';
    }

    async function pickEvalDir() {
      try {
        const r = await fetch(API + '/pick-directory', { method: 'POST' });
        const data = await r.json();
        if (!r.ok) {
          toast(data.message || '无法打开文件夹选择对话框', 'error');
          return;
        }
        if (!data.path) return; // user cancelled
        document.getElementById('evalDirInput').value = data.path;
        useEvalDir();
      } catch (e) {
        toast('网络错误，请检查服务是否运行', 'error');
      }
    }

    function useEvalDir() {
      const path = document.getElementById('evalDirInput').value.trim();
      if (!path) {
        toast('请输入或选择数据集文件夹路径', 'error');
        return;
      }
      evalDir = path;
      evalFile = null;
      clearEvalZoneVisual();
      inspectEvalDataset();
    }

    function clearEvalZoneVisual() {
      const zone = document.getElementById('evalDropZone');
      zone.classList.remove('has-image');
      zone.innerHTML = `<svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg><div class="upload-text">点击或拖拽上传测试数据集 ZIP</div><div class="upload-hint">ZIP 格式 · 包含 registered/ 和 test/ 目录及标注文件</div>`;
      zone.onclick = () => document.getElementById('evalInput').click();
    }

    function buildEvalForm() {
      const form = new FormData();
      if (evalDir) form.append('dataset_dir', evalDir);
      else if (evalFile) form.append('file', evalFile);
      return form;
    }

    async function inspectEvalDataset() {
      if (!evalFile && !evalDir) return;

      try {
        const r = await fetch(API + '/dataset-eval/inspect', { method: 'POST', body: buildEvalForm() });
        const data = await r.json();
        const infoCard = document.getElementById('evalInfoCard');
        const infoList = document.getElementById('evalInfoList');
        const actionCard = document.getElementById('evalActionCard');

        if (!r.ok) {
          infoCard.style.display = 'none';
          actionCard.style.display = 'none';
          toast(data.message || '数据集检查失败', 'error');
          return;
        }

        infoCard.style.display = '';
        infoList.innerHTML = `<div class="identity-row" style="animation-delay:0s">
          <div class="identity-row-left">
            <div class="identity-avatar" style="background:${data.has_registered ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)'};color:${data.has_registered ? 'var(--green)' : 'var(--red)'}">${data.has_registered ? '\u2713' : '\u2717'}</div>
            <div>
              <div class="identity-name">${data.has_registered ? '数据集包含注册集目录' : '数据集不包含注册集目录（将使用本地底库）'}</div>
              <div class="identity-meta">布局检测</div>
            </div>
          </div>
        </div>`;

        actionCard.style.display = '';
        document.getElementById('evalStatus').textContent = '';
      } catch (e) {
        toast('网络错误，请检查服务是否运行', 'error');
      }
    }

    async function runEval() {
      if (!evalFile && !evalDir) return;

      const btn = document.getElementById('evalRunBtn');
      const status = document.getElementById('evalStatus');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 评估中...';
      status.textContent = '这可能需要几分钟，请耐心等待...';

      const form = buildEvalForm();
      form.append('gallery_choice', 'local');

      try {
        const r = await fetch(API + '/dataset-eval/run', { method: 'POST', body: form });
        const data = await r.json();

        if (!r.ok) {
          toast(data.message || '评估失败', 'error');
          status.textContent = '';
          btn.disabled = false;
          btn.innerHTML = '开始评估';
          return;
        }

        // Show results
        const resultDiv = document.getElementById('evalResult');
        const summaryDiv = document.getElementById('evalSummary');
        resultDiv.style.display = '';

        const m = data.metrics;
        const metrics = [
          { label: 'Strict Top-1 准确率', value: (m.strict_top1_accuracy * 100).toFixed(1) + '%', cls: m.strict_top1_accuracy > 0.5 ? 'green' : 'red' },
          { label: 'Matched Top-1 准确率', value: (m.matched_top1_accuracy * 100).toFixed(1) + '%', cls: m.matched_top1_accuracy > 0.5 ? 'green' : 'red' },
          { label: '检测召回率', value: (m.detection_recall * 100).toFixed(1) + '%', cls: m.detection_recall > 0.5 ? 'green' : 'red' },
          { label: '检测精确率', value: (m.detection_precision * 100).toFixed(1) + '%', cls: m.detection_precision > 0.5 ? 'green' : 'red' },
          { label: '未知检测准确率', value: (m.unknown_detected_accuracy * 100).toFixed(1) + '%', cls: m.unknown_detected_accuracy > 0.5 ? 'green' : 'red' },
          { label: '预测未知精确率', value: (m.predicted_unknown_precision * 100).toFixed(1) + '%', cls: m.predicted_unknown_precision > 0.5 ? 'green' : 'red' },
        ];

        summaryDiv.innerHTML = `<div class="eval-summary">${metrics.map(mt => `
          <div class="eval-metric ${mt.cls}">
            <div class="eval-metric-value">${mt.value}</div>
            <div class="eval-metric-label">${mt.label}</div>
          </div>
        `).join('')}</div>`;

        // Show plots
        if (data.plots) {
          const plotsCard = document.getElementById('evalPlotsCard');
          const plotsDiv = document.getElementById('evalPlots');
          plotsCard.style.display = '';

          let plotsHtml = '';
          if (data.plots.confusion_matrix) {
            plotsHtml += `<img class="plot-img" src="${data.plots.confusion_matrix}" alt="混淆矩阵">`;
          }
          if (data.plots.detection_metrics) {
            plotsHtml += `<img class="plot-img" src="${data.plots.detection_metrics}" alt="检测指标">`;
          }
          if (data.plots.accuracy_metrics) {
            plotsHtml += `<img class="plot-img" src="${data.plots.accuracy_metrics}" alt="准确率指标">`;
          }
          plotsDiv.innerHTML = plotsHtml;
        }

        status.textContent = '评估完成';
        toast('评估完成', 'success');
      } catch (e) {
        toast('网络错误或评估超时', 'error');
        status.textContent = '';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '开始评估';
      }
    }
  </script>
</body>

</html>
